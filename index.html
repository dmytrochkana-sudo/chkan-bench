<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дмитрий Чкана — CHKAN BENCH SYSTEM | Тренировки по жиму лежа</title>
    <style>
        /* --- Переменные и Сброс стилей --- */
        :root {
            --bg-main: #0b0c10;
            --bg-card: #12131c;
            --bg-input: #1a1b26;
            --text-primary: #ffffff;
            --text-secondary: #a0a5b5;
            --accent: #e53935;
            --accent-hover: #b71c1c;
            --border: #222533;
            --font-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* --- Компоненты --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--text-primary);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 57, 53, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 2px solid var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--text-primary);
            color: var(--bg-main);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 50px;
        }

        .title-line {
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--accent);
            margin-top: 15px;
        }

        section {
            padding: 100px 0;
            border-bottom: 1px solid var(--border);
        }

        /* --- Шапка (Header) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(11, 12, 16, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        /* --- Главный экран --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: radial-gradient(circle at 85% 30%, rgba(229, 57, 53, 0.18) 0%, transparent 60%), 
                        linear-gradient(135deg, #0b0c10 0%, #12131c 100%);
            padding-top: 100px;
        }

        .hero-content {
            max-width: 850px;
        }

        .hero-badge {
            display: inline-block;
            background-color: rgba(229, 57, 53, 0.1);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 6px 14px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.05;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--accent);
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 45px;
            max-width: 650px;
        }

        .hero-btns {
            display: flex;
            gap: 20px;
        }

        /* --- Блок: Эксперт --- */
        .expert-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .expert-img-container {
            width: 100%;
            height: 550px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-card);
        }

        .expert-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .expert-text p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .achievements-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 35px;
        }

        .achieve-item {
            background-color: var(--bg-card);
            padding: 20px;
            border-left: 3px solid var(--accent);
        }

        .achieve-item .num {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
            display: block;
            line-height: 1.2;
        }

        .achieve-item .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 5px;
        }

        /* --- Блок: Направления --- */
        .directions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .direction-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 40px 30px;
            transition: all 0.3s;
        }

        .direction-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .direction-card h3 {
            font-size: 1.4rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .direction-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* --- Блок: Тарифы / Стоимость --- */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 20px;
        }

        .price-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 45px 35px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .price-card.popular {
            border-color: var(--accent);
            transform: scale(1.03);
        }

        .badge-popular {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent);
            color: #fff;
            padding: 4px 15px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-card h3 {
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .price-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .price-features {
            list-style: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
            flex-grow: 1;
        }

        .price-features li::before {
            content: "✓ ";
            color: var(--accent);
            font-weight: bold;
            margin-right: 5px;
        }

        /* --- Блок: Контакты --- */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .contact-info p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
